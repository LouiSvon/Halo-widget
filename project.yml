name: Halo
options:
  bundleIdPrefix: com.louis
  deploymentTarget:
    macOS: "13.0"

targets:
  Halo:
    type: application
    platform: macOS
    sources:
      - path: Halo
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.louis.halo
        PRODUCT_NAME: Halo
        INFOPLIST_FILE: Halo/Info.plist
        CODE_SIGN_ENTITLEMENTS: Halo/Halo.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - sdk: IOBluetooth.framework
